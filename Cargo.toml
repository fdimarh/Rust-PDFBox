[package]
name = "rust-pdfbox"
version = "0.1.0"
edition = "2024"

[dependencies]
# RustCrypto ecosystem for cryptographic operations
aes = "0.8"                          # AES block cipher
cbc = "0.1"                          # CBC mode of operation
md-5 = "0.10"                        # MD5 hash (RustCrypto)
cipher = "0.4"                       # Cipher trait definitions
digest = "0.10"                      # Generic digest trait
block-padding = "0.3"                # PKCS#7 and other padding schemes

[[example]]
name = "read_info"
path = "examples/read_info.rs"

[[example]]
name = "extract_text"
path = "examples/extract_text.rs"

[[bench]]
name = "bench_core"
path = "benches/bench_core.rs"
harness = false
